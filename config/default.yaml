# Default Configuration for Trading Bot
# Base configuration that can be overridden by environment-specific files

trading:
  mode: mtf
  mtf:
    zone_timeframe: H1
    entry_timeframe: M30
    zone_cache_duration_minutes: 60   # Refresh H1 zones every N minutes

  watchlist:
    - symbol: EURUSD
      enabled: true
    - symbol: GBPUSD
      enabled: true
    - symbol: USDJPY
      enabled: true
    - symbol: USDCHF
      enabled: true
    - symbol: AUDUSD
      enabled: true
    - symbol: USDCAD
      enabled: true
    - symbol: NZDUSD
      enabled: true
    - symbol: EURJPY
      enabled: true
    - symbol: GBPJPY
      enabled: true
    - symbol: XAUUSD
      enabled: true
    - symbol: XAGUSD
      enabled: true
    - symbol: BTCUSD
      enabled: true

  # Note: risk_per_trade is now per-symbol (active_symbols.yaml)
  # Note: max_concurrent_positions is now per-asset-class (active_symbols.yaml)
  # Note: confluence_threshold is now per-asset-class (strategy_parameters.yaml)
  active_broker: exness_cent

database:
  url: "sqlite+aiosqlite:///./data/trading_bot.db"
  echo: false
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  pool_recycle: 3600

# Observability telemetry for the dashboard (does NOT affect trading).
telemetry:
  # Record WHY setups were rejected (climax, confluence-too-low, counter-trend,
  # rsi/structure gate, ...) to the signal_rejections table for the dashboard
  # Rejections / tuning views. Fire-and-forget; auto-disabled without a DB.
  rejections_enabled: true
  rejection_retention_days: 30   # prune older rows hourly

telegram:
  bot_token: null
  chat_id: null
  enabled: false

logging:
  level: "INFO"
  file_path: "./logs/trading_bot.log"
  max_file_size: "10 MB"
  backup_count: 5
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name}:{function}:{line} | {message}"

# Position Management Configuration (Breakeven & Trailing Stop)
# Structure matches docs/position-management-architecture.md
position_management:
  forex_major:  # EURUSD, GBPUSD, etc.
    # ATR-based trailing (Week 15.5 improvement)
    use_atr_trailing: true
    trailing_activation_multiplier: 1.5  # Activate after 1.5x ATR
    trailing_distance_multiplier: 1.0    # Trail by 1.0x ATR

    # Ratio-based (preferred): thresholds scale with each position's ACTUAL
    # stop distance (entry_to_sl_pips), so they stay correct even when the
    # zone-based SL differs from the fixed defaults below. Fixed pip values
    # remain as the fallback when initial risk is unknown.
    breakeven_trigger_r: 0.4       # Arm BE at 40% of risk (lock before reversal)
    trailing_activation_r: 0.7     # Activate trailing at 0.7R
    trailing_distance_r: 0.4       # Trail by 40% of risk

    # Fallback to fixed pips if ATR not available
    breakeven_trigger: 30      # More room (was 15 pips/points)
    breakeven_offset: 5        # Buffer
    trailing_activation: 40    # Activate after 40 pips/points
    trailing_distance: 25      # Trail by 25 pips/points

    # Tiered trailing
    use_tiered_trailing: true
    tier_thresholds: [10, 20, 30]  # Profit levels in pips
    tier_distances: [8, 12, 15]    # Trailing distance per tier

  forex_jpy:  # USDJPY, EURJPY, etc.
    # ATR-based trailing (Week 15.5 improvement)
    use_atr_trailing: true
    trailing_activation_multiplier: 1.5  # Activate after 1.5x ATR
    trailing_distance_multiplier: 1.0    # Trail by 1.0x ATR

    # Ratio-based (preferred): scales with each position's actual stop distance.
    breakeven_trigger_r: 0.4
    trailing_activation_r: 0.7
    trailing_distance_r: 0.4

    # Fallback to fixed pips if ATR not available
    breakeven_trigger: 40     # JPY pairs are more volatile
    breakeven_offset: 5       # Buffer for breakeven
    trailing_activation: 50   # Pips profit to activate trailing
    trailing_distance: 30     # Pips trailing distance

    # Tiered trailing
    use_tiered_trailing: true
    tier_thresholds: [15, 30, 50]  # Profit levels in pips
    tier_distances: [10, 15, 20]   # Trailing distance per tier

  commodities:  # XAUUSD (Gold)
    # ATR-based trailing (Week 15.5 improvement)
    use_atr_trailing: true
    trailing_activation_multiplier: 1.5  # Activate after 1.5x ATR
    trailing_distance_multiplier: 1.0    # Trail by 1.0x ATR (More aggressive locking)

    # Ratio-based (preferred): scales with each position's actual stop distance.
    # Fixes the gold case where fixed BE (175) never armed because the real
    # zone SL (~188) made it ~0.93R instead of the intended 0.5R.
    breakeven_trigger_r: 0.4
    trailing_activation_r: 0.7
    trailing_distance_r: 0.4

    # Fallback to fixed pips if ATR not available
    breakeven_trigger: 50     # $0.50 move (activate sooner)
    breakeven_offset: 10      # $0.10 buffer
    trailing_activation: 80   # Activate at $0.80 profit
    trailing_distance: 40     # Trail by $0.40 initial distance

    # Tiered trailing (TIGHTENING LOGIC)
    use_tiered_trailing: true
    tier_thresholds: [100, 200, 300]  # Profit levels ($1, $2, $3)
    tier_distances: [40, 30, 20]      # TIGHTER as profit grows ($0.40 -> $0.30 -> $0.20)

  crypto:  # BTCUSD, ETHUSD
    # ATR-based trailing (Week 15.5 improvement)
    use_atr_trailing: true
    trailing_activation_multiplier: 1.5  # Activate after 1.5x ATR
    trailing_distance_multiplier: 1.0    # Trail by 1.0x ATR

    # Ratio-based (preferred): scales with each position's actual stop distance.
    # Fixes the BTC case where fixed BE (750) never armed though the trade
    # peaked at +381 pips against a 607-pip SL (~0.63R) before reversing.
    breakeven_trigger_r: 0.4
    trailing_activation_r: 0.7
    trailing_distance_r: 0.4

    # Fallback to fixed pips if ATR not available
    # For BTC price ~$67k, 1 pip usually = $1
    breakeven_trigger: 400    # $400 move (approx 0.6%) to activate BE
    breakeven_offset: 50      # $50 buffer
    trailing_activation: 600  # Activate trailing after $600 move
    trailing_distance: 300    # Trail by $300 distance (approx 0.5%)

    # Tiered trailing
    use_tiered_trailing: true
    tier_thresholds: [500, 1000, 2000]  # Profit levels in USD/pips
    tier_distances: [300, 500, 800]     # Trailing distance per tier

# Partial Close Configuration
# Disabled by default — for small/cent accounts, 25% of 0.01 lot is below
# MT5's 0.01 minimum so partial close cannot actually fire. Set enabled: true
# when positions are large enough (e.g., dynamic lot >= 0.04 so 25% = 0.01).
#
# Level structure (defaults; override via level_ratios below):
#   Level 1: at 50% of TP distance, close 25% of remaining volume
#   Level 2: at 80% of TP distance, close 50% of remaining
# Each level fires once per position. Trailing stop runs independently
# (no conflict — trailing moves SL, partial reduces volume).
partial_close:
  enabled: false
  # MT5 lot-size floor: a single partial-close order must be >= this volume.
  min_volume: 0.01
  # Skip partial close entirely for positions below this volume — a 25% first
  # partial of anything smaller can't clear min_volume, so it would otherwise
  # log "should fire but skipped" every loop. Computed default when unset:
  # min_volume / first-level close% (0.01 / 0.25 = 0.04). Set explicitly here
  # so the size gate is visible/tunable for the cent account.
  min_position_volume: 0.04
  # Partial-close ladder: proportion of TP distance + close % of remaining
  # volume. The first level should sit at a REACHABLE tier (live data: ~19%
  # of trades reach ~1R, almost none reach 2R). Tune via the Phase 1 backtest
  # sweep before enabling. Flat list applies to all assets; a dict keyed by
  # asset class (with a `default`) allows per-asset ladders.
  # level_ratios:
  #   - [0.5, 0.25]   # level 1: 50% of TP distance, close 25%
  #   - [0.8, 0.50]   # level 2: 80% of TP distance, close 50% of remaining

# Risk Management Configuration
risk_management:
  max_positions_per_symbol: 1
  # Note: global "max_total_positions" removed — per-asset-class limits in
  # active_symbols.yaml are the single source of truth (sum = effective cap).
  max_leverage: 10.0
  max_asset_class_exposure_percent: 40.0

  # Correlation Management
  # Prevents conflicting positions on correlated pairs
  correlation_management:
    enabled: true

    # Positive Correlation Groups
    # Pairs that typically move together (correlation > 0.7)
    # Correlated pairs should have the same direction (both BUY or both SELL)
    correlation_groups:
      # Major USD pairs (positive correlation ~0.7-0.9)
      EURUSD:
        - GBPUSD
        - AUDUSD
        - NZDUSD
      GBPUSD:
        - EURUSD
        - AUDUSD
        - NZDUSD
      AUDUSD:
        - EURUSD
        - GBPUSD
        - NZDUSD
      NZDUSD:
        - EURUSD
        - GBPUSD
        - AUDUSD

      # USD pairs (positive correlation ~0.6-0.8)
      USDJPY:
        - USDCHF
        - USDCAD
      USDCHF:
        - USDJPY
        - USDCAD
      USDCAD:
        - USDJPY
        - USDCHF

      # JPY pairs (positive correlation ~0.7-0.9)
      EURJPY:
        - GBPJPY
        - AUDJPY
      GBPJPY:
        - EURJPY
        - AUDJPY
      AUDJPY:
        - EURJPY
        - GBPJPY

    # Negative Correlation Groups
    # Pairs that move in opposite directions (correlation < -0.7)
    # Negatively correlated pairs should have opposite directions
    # Example: USDCAD BUY (USD strong) vs EURUSD SELL (USD weak vs EUR)
    negative_correlation_groups:
      # USD pairs vs Major pairs (negative correlation ~-0.7 to -0.9)
      # When USD is strong (USDCAD/USDJPY/USDCHF BUY), major pairs should be weak (EURUSD/GBPUSD SELL)
      USDCAD:
        - EURUSD
        - GBPUSD
        - AUDUSD
        - NZDUSD
      USDJPY:
        - EURUSD
        - GBPUSD
        - AUDUSD
        - NZDUSD
      USDCHF:
        - EURUSD
        - GBPUSD
        - AUDUSD
        - NZDUSD

      # Reverse mapping: Major pairs vs USD pairs
      EURUSD:
        - USDCAD
        - USDJPY
        - USDCHF
      GBPUSD:
        - USDCAD
        - USDJPY
        - USDCHF
      AUDUSD:
        - USDCAD
        - USDJPY
        - USDCHF
      NZDUSD:
        - USDCAD
        - USDJPY
        - USDCHF
