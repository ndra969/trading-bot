# Development Configuration
# Overrides default.yaml for development environment

trading:
  risk_per_trade: 0.001  # 0.1% risk for development (conservative)
  max_concurrent_positions: 3
  confluence_threshold: 70.0  # Higher threshold for development
  market_validation: false  # Skip market hours validation in development

telegram:
  enabled: true  # Enable notifications in development

logging:
  level: "DEBUG"  # Verbose logging for development
  file_path: "./logs/trading_bot_dev.log"

# MT5 Configuration for Development
mt5:
  # terminal_path intentionally NOT set — bot attaches to whichever MT5
  # terminal (Broker B) the user already has running and logged in.
  # Setting terminal_path forces mt5.initialize(path=...) which can't
  # login without a password, so leaving it empty preserves the
  # "use running terminal" workflow.
  #   Expected terminal: C:\Program Files\MetaTrader 5\Broker B
  login: 159394302
  # password: "your_password"  # Uncomment and set if needed
  server: "Exness-MT5Real20"  # Force specific server to prevent auto-switch
  connection_timeout: 60
