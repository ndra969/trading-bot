# Strategy Parameters Configuration
# Supply & Demand Foundation Strategy Settings

# Strategy Manager Configuration
strategy_manager:
  max_concurrent_strategies: 8
  conflict_prevention: true
  health_check_interval: 300

# Confluence Weights for Signal Aggregation
confluence_weights:
  foundation: 1.0        # Foundation S&D strategy (100% for Phase 2.5)
  trendline: 0.0         # Phase 5 enhancement
  price_action: 0.0      # Phase 5 enhancement
  fibonacci: 0.0         # Phase 5 enhancement
  breakout_retest: 0.0   # Phase 5 enhancement
  market_structure: 0.0  # Phase 5 enhancement
  volume_profile: 0.0    # Phase 5 enhancement
  multi_timeframe: 0.0   # Phase 5 enhancement

# Signal Aggregator Configuration
signal_aggregator:
  conflict_resolution: "highest_score"  # Options: highest_score, first_signal

supply_demand:
  # Zone Detection Parameters
  zone_detection:
    min_zone_strength: 50.0      # Minimum strength score (0-100)
    max_zone_age_hours: 72       # Maximum zone age for consideration (3 days)
    min_touch_points: 2          # Minimum touches for zone validation
    volume_confirmation: true    # Require volume confirmation for zones
    min_zone_size_pips: 5        # Minimum zone size in pips
    max_zone_size_pips: 100      # Maximum zone size in pips
  
  # Zone Scoring Weights
  scoring_weights:
    strength_weight: 0.4         # Zone strength importance
    freshness_weight: 0.3        # Zone age/freshness importance
    volume_weight: 0.2           # Volume confirmation importance
    touches_weight: 0.1          # Number of touches importance
  
  # Zone Types Configuration
  zone_types:
    rejection:                   # Price rejected strongly from level
      enabled: true
      min_wick_ratio: 0.6       # Minimum wick to body ratio
      max_body_size_pct: 30     # Maximum body size percentage
    
    consolidation:               # Price consolidated in range
      enabled: true
      min_touches: 3            # Minimum touches in consolidation
      max_range_pips: 20        # Maximum range size in pips
    
    breakout_origin:            # Zone where breakout originated
      enabled: true
      min_breakout_momentum: 0.7 # Minimum momentum for valid breakout
      min_volume_increase: 1.5   # Minimum volume increase factor

# Signal Generation Configuration
signal_generation:
  # Signal Quality Requirements
  quality_thresholds:
    min_confluence_score: 65.0   # Minimum overall confluence score
    min_foundation_score: 70.0   # Minimum foundation S&D score
    max_signals_per_symbol: 1    # Maximum signals per symbol
    signal_refresh_interval: 300  # Signal refresh interval (seconds)
  
  # Signal Validation Rules
  validation_rules:
    require_foundation: true     # Foundation strategy required
    conflict_prevention: true    # Prevent conflicting signals
    market_hours_validation: true # Validate market hours
    
  # Risk/Reward Requirements
  risk_reward:
    min_risk_reward_ratio: 2.0   # Minimum R:R ratio (1:2)
    max_stop_loss_pips: 50       # Maximum stop loss in pips
    default_take_profit_ratio: 3.0 # Default TP ratio (1:3)

# Multi-Timeframe Analysis Configuration
timeframe_analysis:
  # Trading Type Adaptive Timeframes
  trading_type_timeframes:
    scalping:
      primary: "M5"              # Primary analysis timeframe
      confluence: ["M15", "H1"]  # Confluence timeframes
      
    day_trading:
      primary: "H1"
      confluence: ["H4", "D1"]
      
    swing_trading:
      primary: "H4"
      confluence: ["D1", "W1"]
      
    position_trading:
      primary: "D1"
      confluence: ["W1", "MN1"]
  
  # Analysis Parameters
  analysis_settings:
    min_confluence_score: 65.0   # Minimum confluence score for signals
    timeframes_required: 2       # Minimum timeframes for validation
    cache_duration_minutes: 5    # Cache duration for analysis results
    max_analysis_time_seconds: 10 # Maximum time for analysis

# Performance Settings
performance:
  cache_enabled: true
  cache_duration_minutes: 5
  max_analysis_time_seconds: 10
  async_processing: true
  max_concurrent_analysis: 5

# Database Settings
database:
  zone_retention_days: 7         # Keep zones for 7 days
  cleanup_interval_hours: 24     # Cleanup old zones every 24 hours
  max_zones_per_symbol: 50       # Maximum zones stored per symbol

