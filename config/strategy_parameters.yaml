# Strategy Parameters Configuration
# Supply & Demand Foundation Strategy Settings

# Strategy Manager Configuration
strategy_manager:
  max_concurrent_strategies: 8
  conflict_prevention: true
  health_check_interval: 300

# Confluence Weights for Signal Aggregation (Phase 5 Enhanced)
confluence_weights:
  foundation: 0.30           # Foundation S&D zones
  trendline: 0.20            # Trendline confluence
  price_action: 0.15         # Price Action patterns
  fibonacci: 0.12            # Fibonacci levels
  breakout_retest: 0.12      # Breakout confirmation
  structure: 0.08            # Market Structure (BOS/CHoCH) — key must match foundation_engine
  rsi: 0.10                  # RSI Analysis
  ma: 0.08                   # Moving Average alignment
  volume_profile: 0.05       # (Optional) Volume profile
  multi_timeframe: 0.05      # (Optional) MTF confirmation

# Enhancement Layer Parameters
rsi:
  period: 14
  overbought: 70
  oversold: 30

ma:
  fast_period: 9
  medium_period: 21
  slow_period: 50
  trend_period: 200
  ema: true

trendline:
  min_touches: 3
  tolerance: 0.0005

price_action:
  enabled_patterns: ["PINBAR", "ENGULFING", "INSIDE_BAR", "DOJI", "HARAMI", "OUTSIDE_BAR", "MORNING_STAR", "EVENING_STAR", "PULLBACK", "ORDER_BLOCK", "LIQUIDITY_SWEEP", "DOUBLE_TOP", "DOUBLE_BOTTOM"]
  min_confidence: 60.0

fibonacci:
  levels: {0.382: 10, 0.5: 20, 0.618: 15}
  tolerance: 0.0005

structure:
  lookback: 50                # Bars to look back for swing detection

breakout:
  volume_threshold: 1.2       # Minimum volume ratio vs average for valid breakout
  min_body_ratio: 0.6         # Candle body must be ≥60% of total range

# Signal Aggregator Configuration
signal_aggregator:
  conflict_resolution: "highest_score"  # Options: highest_score, first_signal

supply_demand:
  # Zone Detection Parameters
  zone_detection:
    min_zone_strength: 50.0      # Minimum strength score (0-100)
    max_zone_age_hours: 72       # Maximum zone age for consideration (3 days)
    min_touch_points: 2          # Minimum touches for zone validation
    volume_confirmation: true    # Require volume confirmation for zones
    min_zone_size_pips: 5        # Minimum zone size in pips
    max_zone_size_pips: 1000     # Maximum zone size in pips

  # Zone Scoring Weights
  scoring_weights:
    strength_weight: 0.4         # Zone strength importance
    freshness_weight: 0.3        # Zone age/freshness importance
    volume_weight: 0.2           # Volume confirmation importance
    touches_weight: 0.1          # Number of touches importance

  # Zone Types Configuration
  zone_types:
    rejection:                   # Price rejected strongly from level
      enabled: true
      min_wick_ratio: 0.6       # Minimum wick to body ratio
      max_body_size_pct: 30     # Maximum body size percentage

    consolidation:               # Price consolidated in range
      enabled: true
      min_touches: 3            # Minimum touches in consolidation
      max_range_pips: 20        # Maximum range size in pips

    breakout_origin:            # Zone where breakout originated
      enabled: true
      min_breakout_momentum: 0.7 # Minimum momentum for valid breakout
      min_volume_increase: 1.5   # Minimum volume increase factor

# Signal Generation Configuration
signal_generation:
  # Signal Quality Requirements — per asset class
  # foundation_engine looks up `<asset_class>` first, falls back to `default`.
  # Asset classes recognised: forex_major, forex_jpy, commodities, crypto.
  quality_thresholds:
    # Recalibrated 2026-06-02 for the NORMALISED confluence score.
    # Confluence is now a weighted AVERAGE over participating layers
    # (see foundation_engine._calculate_confluence_score), not an absolute
    # weighted sum. Under the old sum, momentum/trend layers (rsi, structure,
    # breakout) structurally stayed silent at reversal zones, so the score
    # could never exceed ~57 and the documented 65% gate was impossible —
    # which is why earlier thresholds were forced down to 38-48 (and the bot
    # took low-quality signals → sustained losses).
    #
    # With normalisation the score spans a true 0-100 again (estimated avg
    # ~43, strong setups ~65-75). Thresholds raised back toward the 65%
    # design target to keep only above-average setups. MONITOR for a few days
    # and tune: too few signals → lower ~3pts; still losing → raise ~3pts.
    #
    # CAVEAT: a weighted average rewards FEWER participating layers (smaller
    # denominator). require_price_action stays ON so price action always
    # participates; consider a "min participating enhancement layers" guard
    # if lonely high-strength zones start passing on thin confirmation.
    default:
      min_confluence_score: 60.0
      min_foundation_score: 30.0
      min_price_action_score: 8.0

    forex_major:
      min_confluence_score: 62.0       # normalised scale; toward 65% design target
      min_foundation_score: 30.0
      min_price_action_score: 8.0

    forex_jpy:
      min_confluence_score: 62.0
      min_foundation_score: 35.0
      min_price_action_score: 8.0

    commodities:
      min_confluence_score: 58.0
      min_confluence_score_counter: 64.0   # stricter counter-trend
      min_foundation_score: 25.0
      min_price_action_score: 8.0

    crypto:
      min_confluence_score: 58.0
      min_foundation_score: 28.0
      min_price_action_score: 8.0

    # Globals (apply to all asset classes)
    max_signals_per_symbol: 1
    signal_refresh_interval: 300

  # Signal Validation Rules — per asset class with `default` fallback
  validation_rules:
    default:
      require_foundation: true
      require_price_action: true

    forex_major:
      require_foundation: true
      require_price_action: true

    forex_jpy:
      require_foundation: true
      require_price_action: true

    commodities:
      require_foundation: true
      require_price_action: false   # Gold often moves on macro without clean PA

    crypto:
      require_foundation: true
      require_price_action: true    # Crypto needs PA confirmation due to volatility

    # Globals
    conflict_prevention: true       # Prevent conflicting signals (all assets)
    market_hours_validation: true   # Validate market hours (all assets)

  # Climax / exhaustion candle filter — blocks entries on overextended candles.
  # Rejects when the latest candle's range > climax_multiplier × ATR(14)-equiv
  # average range (chasing a spent move). Lower = stricter.
  # Resolves `<asset_class>` first, falls back to `default`.
  # 2026-06-02: previously forex never hit this filter — the code branched on
  # a non-existent `forex_majors` asset class (canonical is `forex_major`) and
  # forex_jpy had no branch, so both fell through to a loose 3.0×. Forex
  # entries were chasing tall H1 candles into immediate pullbacks.
  volatility_filter:
    default:
      climax_multiplier: 2.5
    forex_major:
      climax_multiplier: 2.0
    forex_jpy:
      climax_multiplier: 2.0
    commodities:
      climax_multiplier: 2.0
    crypto:
      climax_multiplier: 2.5

  # Commodities-only entry gates (gold/silver). Per-direction so the BUY vs
  # SELL asymmetry is EXPLICIT and tunable instead of hidden in code.
  # 2026-06-03: values extracted verbatim from the previously-hardcoded gates
  # — behaviour is unchanged. The asymmetry (BUY was relaxed for backtest, SELL
  # was not) is intentional-looking but unverified; tune here, don't re-hardcode.
  commodity_gates:
    # Lower-wick (BUY bounce) / upper-wick (SELL rejection) confirmation:
    # reject if wick/range < min_ratio (trend_following_ratio when entry aligns
    # with the EMA20 trend).
    rejection_wick:
      buy:
        min_ratio: 0.15
        trend_following_ratio: 0.08
      sell:
        min_ratio: 0.30
        trend_following_ratio: 0.15
    # Signal-candle colour: BUY wants green, SELL wants red. A counter-colour
    # candle is allowed only if its body < *_small_body_exception of range
    # (treated as doji/neutral). 0.0 = never allow (strict).
    color_match:
      buy_small_body_exception: 0.30
      sell_small_body_exception: 0.0
    # High-volatility counter-trend block: when current_range > vol_mult ×
    # ATR(14)-avg, reject if price is on the wrong side of EMA20 by more than
    # ema_buffer_pct (% of EMA). 0.0 buffer = block any wrong-side close.
    volatility_trend_gate:
      buy:
        vol_mult: 2.0
        ema_buffer_pct: 0.3
      sell:
        vol_mult: 1.5
        ema_buffer_pct: 0.0

  # Risk/Reward Requirements
  risk_reward:
    min_risk_reward_ratio: 2.0   # Minimum R:R ratio (1:2)
    max_stop_loss_pips: 50       # Maximum stop loss in pips
    default_take_profit_ratio: 2.0 # Default TP ratio (1:2)

    # Zone-Based Stop Loss (NEW)
    # When enabled, SL is calculated from zone size instead of fixed pips
    # Formula: SL = zone_size * buffer_multiplier (with min/max limits)
    # Per-symbol config in active_symbols.yaml takes precedence
    use_zone_based_sl: false  # Default: false (use fixed SL from trading_types.yaml)
    zone_sl_buffer_multiplier: 1.2  # Place SL 20% beyond zone boundary

    # Minimum Stop Loss Distance (in pips) - ASSET CLASS DEFAULTS
    # NOTE: Per-symbol overrides in active_symbols.yaml take precedence!
    # These are fallback values when symbol-specific config not found.
    min_stop_loss_distance:
      forex_major: 15.0          # 15 pips (150 points for 5-digit broker) for EURUSD, GBPUSD, etc.
      forex_jpy: 15.0            # 15 pips (150 points for 5-digit broker) for USDJPY, EURJPY, etc.
      commodities: 80.0          # 80 pips for XAUUSD (Gold) - updated from 40 ($8 vs $4)
      crypto: 50.0               # 50 pips for BTCUSD, ETHUSD, etc.

    # Maximum Stop Loss Distance (in pips) - ASSET CLASS DEFAULTS
    # NOTE: Per-symbol overrides in active_symbols.yaml take precedence!
    max_stop_loss_distance:
      forex_major: 60.0          # Maximum 60 pips SL for forex major
      forex_jpy: 60.0            # Maximum 60 pips SL for JPY pairs
      commodities: 300.0         # Maximum 300 pips SL for commodities (Gold: $30)
      crypto: 200.0              # Maximum 200 pips SL for crypto

    # Maximum Take Profit Distance (in pips) - ASSET CLASS DEFAULTS
    # Prevents TP from being too far and unreachable
    max_take_profit_distance:
      forex_major: 60.0           # Maximum 60 pips TP distance for forex major
      forex_jpy: 60.0             # Maximum 60 pips TP distance for JPY pairs
      commodities: 600.0          # Maximum 600 pips TP distance for commodities (Gold: $60)
      crypto: 200.0               # Maximum 200 pips TP distance for crypto

# NOTE: removed sections (no code consumers as of 2026-05-27):
#   - timeframe_analysis.*  (mtf_analyzer takes timeframes as method args)
#   - performance.*         (no generic cache/async layer reads these)
#   - database.*            (no zone retention/cleanup logic implemented)
# If reintroduced, add the corresponding reader code + tests.
