# Trading Configuration for Multi-Timeframe Strategy
#
# This file configures the MTF trading mode where:
# - Zones are detected on higher timeframe (H1)
# - Entries are confirmed on lower timeframe (M30)

trading:
  # MTF Mode Configuration
  mode: mtf  # Options: 'single' (legacy single TF) or 'mtf' (multi-timeframe)

  # Multi-Timeframe Settings
  mtf:
    zone_timeframe: H1      # Higher TF for zone detection
    entry_timeframe: M30    # Lower TF for entry confirmation
    zone_cache_minutes: 60  # Cache H1 zones for 1 hour (performance optimization)

  # Watchlist - Universal symbols (will be converted to broker symbols automatically)
  watchlist:
    - symbol: XAUUSD
      enabled: true
      description: "Gold - High volatility commodity"

    - symbol: EURUSD
      enabled: true
      description: "Euro/USD - Major forex pair"

    - symbol: GBPUSD
      enabled: true
      description: "Pound/USD - Major forex pair"

  # Risk Management
  risk:
    max_positions_total: 5          # Max total open positions
    max_positions_per_symbol: 1     # Max positions per symbol
    risk_per_trade_percent: 1.0     # % of account per trade

  # Dry-run Mode (for testing without real trades)
  dry_run: false  # Set to true for paper trading
