# Production Configuration
# Overrides default.yaml for production environment

trading:
  risk_per_trade: 0.005  # 0.5% risk for production
  max_concurrent_positions: 10
  confluence_threshold: 65.0

telegram:
  enabled: true  # Enable notifications in production

logging:
  level: "INFO"  # Standard logging for production
  file_path: "./logs/trading_bot_prod.log"
  max_file_size: "50 MB"
  backup_count: 10