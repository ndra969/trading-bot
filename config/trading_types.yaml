# Trading Types Configuration
# Different trading styles with their parameters

trading_types:
  scalping:
    name: "Scalping"
    description: "Ultra-short term trading, 1-240 minutes duration"
    risk_per_trade: 0.002  # 0.2%
    max_positions: 20
    confluence_threshold: 75.0
    max_loss_per_day: 0.01  # 1%
    max_position_duration_hours: 4  # Auto-close positions after 4 hours (ultra-short term)
    timeframes: ["M1", "M5", "M15"]
    preferred_sessions: ["london", "new_york"]
    stop_loss_pips:
      forex_major: 5
      forex_jpy: 50
      commodities: 20
    take_profit_pips:
      forex_major: 8
      forex_jpy: 80
      commodities: 30

  day_trading:
    name: "Day Trading"
    description: "Intraday trading, 30-1440 minutes duration"
    risk_per_trade: 0.01  # 1%
    max_positions: 5
    confluence_threshold: 30.0  # Lowered to 30% to increase trade frequency
    max_loss_per_day: 0.02  # 2%
    max_position_duration_hours: 24  # Auto-close positions after 24 hours (intraday limit)
    timeframes: ["M15", "H1", "H4"]
    preferred_sessions: ["london", "new_york", "tokyo"]
    stop_loss_pips:
      forex_major: 30        # Increased from 15 to give room
      forex_jpy: 40          # Increased from 15 (150 pts) -> 40 (400 pts)
      commodities: 100       # Increased from 50 (for Gold/Silver volatile)
    take_profit_pips:
      forex_major: 60        # 1:2 RR
      forex_jpy: 80
      commodities: 200

  swing_trading:
    name: "Swing Trading"
    description: "Multi-day trading, 1-7 days duration"
    risk_per_trade: 0.02  # 2%
    max_positions: 3
    confluence_threshold: 30.0
    max_loss_per_day: 0.05  # 5%
    timeframes: ["H4", "D1", "W1"]
    preferred_sessions: ["london", "new_york"]
    stop_loss_pips:
      forex_major: 80        # Increased from 50
      forex_jpy: 800         # Increased from 500
      commodities: 300       # Increased from 200
    take_profit_pips:
      forex_major: 160
      forex_jpy: 1600
      commodities: 600

  position_trading:
    name: "Position Trading"
    description: "Long-term trading, 1-4 weeks duration"
    risk_per_trade: 0.05  # 5%
    max_positions: 1
    confluence_threshold: 50.0
    max_loss_per_day: 0.10  # 10%
    timeframes: ["D1", "W1", "MN1"]
    preferred_sessions: ["london", "new_york", "tokyo"]
    stop_loss_pips:
      forex_major: 150
      forex_jpy: 1500
      commodities: 500
    take_profit_pips:
      forex_major: 500
      forex_jpy: 5000
      commodities: 1500

# Active trading type (can be changed via CLI)
active_trading_type: day_trading
