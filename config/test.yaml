# Test Configuration
# Dry-run by default. Intended workflow: routine testing uses mock MT5 (no
# real broker needed); only enable --connect-mt5 for occasional real-data
# verification.
#
# Usage:
#   uv run trading-bot --config test start                  # mock MT5 (safe, default)
#   uv run trading-bot --config test start --connect-mt5    # real MT5 (see notes)
#
# IMPORTANT: MT5 Python is single-instance-per-process. With Broker B's
# terminal running for development, --connect-mt5 will either IPC-timeout or
# silently attach to Broker B. For Broker A connection:
#   1. Close Broker B's terminal first, AND
#   2. Manually launch Broker A's terminal64.exe and login (cache creds), AND
#   3. Then run with --connect-mt5
# Or just don't pass --connect-mt5 — mock MT5 needs none of this.

trading:
  dry_run: true               # Always start in dry-run for this config
  risk_per_trade: 0.001       # 0.1% — same conservative bar as development
  max_concurrent_positions: 3
  confluence_threshold: 70.0
  market_validation: false    # Skip market hours validation for off-hours testing

telegram:
  enabled: false              # Silent in test — no notification spam

logging:
  level: "DEBUG"
  file_path: "./logs/trading_bot_test.log"  # Separate log file from dev

# MT5 Configuration — same account as development; intended Broker A terminal
mt5:
  # terminal_path intentionally NOT set. Forcing path=Broker A here would
  # IPC-timeout while Broker B is running (single-instance-per-process limit).
  # When you've manually closed Broker B and launched Broker A, this config
  # attaches to it cleanly.
  #   Expected terminal: C:\Program Files\MetaTrader 5\Broker A
  login: 159394302
  # password: set MT5_PASSWORD in .env.test if terminal isn't logged in
  server: "Exness-MT5Real20"
  connection_timeout: 60
