# Test Configuration — Mock MT5 Only
#
# This config is for safe, isolated testing without touching any real broker
# account. dry_run is forced true; no real credentials are stored here.
#
# Usage:
#   uv run trading-bot --config test start
#
# Mock mode behavior:
#   - No MT5 terminal connection
#   - Simulated account: 12345678 with $10,000 balance (from cli.py mock)
#   - All orders simulated in memory; no orders sent anywhere
#   - Safe to run while development bot (Broker B) is active
#
# --connect-mt5 with this config is NOT recommended: there are no
# credentials here, so MT5 would just attach to whichever terminal happens
# to be running (likely Broker B from dev). If you need real-data testing,
# use --config development with --dry-run --connect-mt5 instead.

trading:
  dry_run: true               # Always start in dry-run for this config
  risk_per_trade: 0.001       # 0.1% — same conservative bar as development
  max_concurrent_positions: 3
  confluence_threshold: 70.0
  market_validation: false    # Skip market hours validation for off-hours testing

telegram:
  enabled: false              # Silent in test — no notification spam

logging:
  level: "DEBUG"
  file_path: "./logs/trading_bot_test.log"  # Separate log file from dev

# MT5 Configuration — intentionally empty
# Real credentials are NOT defined here to prevent accidental production
# connect. Mock MT5 mode bypasses this entirely. If you need real MT5
# data for an isolated test, use --config development with --dry-run.
mt5:
  connection_timeout: 60
