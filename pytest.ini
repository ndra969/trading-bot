[tool:pytest]
# Skip complex integration tests that require extensive mock setup
markers =
    skip_complex_tests: Skip tests requiring complex database mocking
    skip_advanced_orchestrator: Skip advanced orchestrator error handling tests
    skip_repository_integration: Skip repository integration tests requiring real database

# Automatically skip certain test patterns
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::RuntimeWarning:.*coroutine.*was never awaited

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*
